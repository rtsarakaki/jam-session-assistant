# Aplica migrações em `supabase/migrations/` ao projeto Supabase ligado (remoto).
# Secrets necessários: ver `supabase/README.md` secção "GitHub Actions".

name: Supabase — aplicar migrações

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-db-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      # Remote-only migration version to mark as reverted before db push.
      # Keep empty when there is nothing to repair.
      SUPABASE_REPAIR_REVERTED_VERSION: "20260428100000"

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Ligar ao projeto remoto
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Reparar histórico remoto de migrações (quando necessário)
        if: ${{ env.SUPABASE_REPAIR_REVERTED_VERSION != '' }}
        run: |
          set -euo pipefail
          v="$SUPABASE_REPAIR_REVERTED_VERSION"
          echo "Tentando reparar migration remota ausente localmente: $v"
          out="$(supabase migration repair --status reverted "$v" 2>&1)" || rc=$?
          rc="${rc:-0}"
          echo "$out"
          # Idempotente: se a versão já não estiver no histórico remoto, segue o pipeline.
          if [ "$rc" -ne 0 ]; then
            if echo "$out" | grep -qi "not found"; then
              echo "Versão $v já não está pendente de repair. Seguindo."
            else
              exit "$rc"
            fi
          fi

      # Use apenas `db push`: `--include-all` reaplica migrações já em schema_migrations e pode falhar
      # com duplicate key após o SQL ser executado outra vez.
      - name: Aplicar migrações (db push)
        run: supabase db push --yes
